apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: mlflow
    targetRevision: "0.7.19"
    helm:
      values: |
        serviceAccount:
          create: false
          name: mlflow 

        artifactRoot:
          s3:
            enabled: true
            bucket: mlops-mlflow-artifacts-709598629349
            path: mlflow
            awsRegion: eu-west-1


        backendStore:
          databaseMigration: true
          postgres:
            enabled: true
            host: "mlflow-db.cj4o8g0uewbo.eu-west-1.rds.amazonaws.com"
            port: 5432
            database: mlflow
            user: mlflow_admin
            password: "z2RhrZFH90A8kyOM"

        persistence:
          enabled: false
          size: 2Gi

        service:
          type: ClusterIP
          port: 5000
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: mlflow.mlops.local
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true