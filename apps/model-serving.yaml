apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-serving
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/FatimaGhi/mlops-gitops
    targetRevision: main
    path: charts/model-serving

  destination:
    server: https://kubernetes.default.svc
    namespace: model-serving

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false