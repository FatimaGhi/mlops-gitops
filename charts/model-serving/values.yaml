image:
  repository: 709598629349.dkr.ecr.eu-west-1.amazonaws.com/model-serving
  tag: "9cc25639f97729a03cc4efee3e6d73648c91ea8f"
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: api.mlops.local
      paths:
        - path: /
          pathType: Prefix

mlflow:
  trackingUri: "http://mlflow.mlflow.svc.cluster.local:5000"
  modelName: "MyModel"
  modelStage: "Production"

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"